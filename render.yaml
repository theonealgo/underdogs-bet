services:
  - type: web
    name: underdogs-bet
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn NHL77FINAL:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --preload
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: app-data
      mountPath: /data
      sizeGB: 1
