{% extends "base.html" %}

{% block extra_styles %}
<style>
    .auth-container {
        max-width: 400px;
        margin: 60px auto;
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    
    .auth-container h2 {
        text-align: center;
        margin-bottom: 30px;
        color: #667eea;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: 500;
        color: #333;
    }
    
    .form-group input {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #667eea;
    }
    
    .btn-full {
        width: 100%;
        margin-top: 10px;
    }
    
    .text-center {
        text-align: center;
        margin-top: 20px;
    }
    
    .text-center a {
        color: #667eea;
        text-decoration: none;
    }
    
    .text-center a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>🔐 Login to UnitDuel</h2>
    
    <form method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        
        <button type="submit" class="btn btn-full">Login</button>
    </form>
    
    <div class="text-center">
        <p>Don't have an account? <a href="/signup">Sign up here</a></p>
    </div>
</div>
{% endblock %}
